<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한글 수묵 연주회 - 타자 속도 반영</title>
    <script src="https://unpkg.com/hangul-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        body { margin: 0; background-color: #f4f1ea; overflow: hidden; font-family: 'Noto Serif KR', serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .ui { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        textarea { 
            width: 60%; height: 150px; background: rgba(255,255,255,0.5); 
            border: 1px solid #999; border-radius: 12px; padding: 25px;
            font-size: 1.5rem; outline: none; resize: none; margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .btn-group { display: flex; gap: 20px; }
        button { 
            padding: 12px 35px; border-radius: 30px; border: 1px solid #333; 
            background: #333; color: #fff; cursor: pointer; font-size: 1.1rem; transition: 0.3s;
        }
        button:hover { background: #555; transform: translateY(-2px); }
        .clear-btn { background: transparent; color: #a00; border-color: #a00; }
        .clear-btn:hover { background: #fdeaea; }
    </style>
</head>
<body>
    <canvas id="inkCanvas"></canvas>
    <div class="ui">
        <textarea id="inputArea" placeholder="당신의 리듬대로 글을 써보세요..."></textarea>
        <div class="btn-group">
            <button onclick="playMyRhythm()">내 리듬으로 연주하기</button>
            <button class="clear-btn" onclick="clearAll()">전체 지우기</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
