<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한글 국악 연주회</title>
    <script src="https://unpkg.com/hangul-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        body { margin: 0; background-color: #f4f1ea; overflow: hidden; font-family: serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .container { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        textarea { 
            width: 60%; height: 150px; background: rgba(255,255,255,0.2); 
            border: 1px solid #ccc; border-radius: 10px; padding: 20px;
            font-size: 1.5rem; outline: none; resize: none; text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <canvas id="inkCanvas"></canvas>
    <div class="container">
        <h1>한글 수묵 연주회</h1>
        <textarea id="inputArea" placeholder="입력하기"></textarea>
        <p>초성: 가야금/거문고 | 중성: 생황/해금 | 종성: 장구 | Space: 덩!</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
